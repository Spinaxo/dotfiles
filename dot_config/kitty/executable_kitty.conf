
# Window settings

window_padding_width 0
window_padding_height 0
dynamic_background_opacity yes
background_opacity 0.99
remember_window_size no
initial_window_width 133c
initial_window_height 40c

# Force exact window dimensions

resize_debounce_time 0.1
resize_draw_strategy static

# Scrolling

scrollback_lines 10000

# Font configuration

font_family FiraCode Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11

# Fix font stretching

disable_ligatures never
font_features none

# Cursor

cursor_shape underline
cursor_beam_thickness 0.15
cursor_underline_thickness 0.15
cursor_blink_interval 0

# Mouse

mouse_hide_wait 3.0
copy_on_select yes

# Colors (Gruvbox Dark Soft)

# Managed by kitty themes

# BEGIN_KITTY_THEME

# Gruvbox Dark Soft

include current-theme.conf

# END_KITTY_THEME

# Key bindings

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+f show_scrollback
map ctrl+l clear_terminal clear_screen
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down
map shift+home scroll_home
map shift+end scroll_end

map ctrl+t new_tab
map ctrl+w close_tab

# Font size controls

map ctrl+equal change_font_size all +1
map ctrl+minus change_font_size all -1
map ctrl+0 change_font_size all 0

# Mouse bindings

mouse_map middle release ungrabbed paste_from_selection

# Bell

enable_audio_bell no
visual_bell_duration 0.0

# Advanced

allow_remote_control no
update_check_interval 0
